<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" href="photo.ico" type="image/x-icon">
    <title>История Freedom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            background-color: #000;
            color: #fff;
            -ms-user-select: none; 
            -moz-user-select: none; 
            -webkit-user-select: none; 
            user-select: none; 
        }
        .navbar {
            background: linear-gradient(90deg, #000, #ff6600);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 12px rgba(255, 102, 0, 0.3);
        }
        .nav-container {
            display: flex;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
            text-decoration: none;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: rgba(0, 0, 0, 0.7);
            color: #ff6600;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
        }
        .nav-btn:hover {
            background: #ff6600;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(255, 102, 0, 0.4);
            text-decoration: none;
        }
        .container {
            display: flex;
            min-height: calc(100vh - 70px);
        }
        .sidebar {
            width: 200px;
            background-color: #111;
            border-right: 2px solid #ff6600;
        }
        .tab-button {
            display: block;
            width: 100%;
            padding: 15px 10px;
            background-color: #222;
            color: #ff6600;
            border: none;
            border-bottom: 1px solid #333;
            cursor: pointer;
            font-size: 35px;
            text-align: center;
            transition: all 0.3s;
            font-family: 'Rubik Mono One', monospace;
        }
        .tab-button:hover {
            background-color: #333;
            color: #ff9900;
        }
        .tab-button.active {
            background-color: #ff6600;
            color: #000;
            font-weight: bold;
        }
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 2px solid #ff6600;
                display: flex;
                overflow-x: auto;
            }
            .tab-button {
                flex-shrink: 0;
                width: auto;
                min-width: 80px;
                text-align: center;
                border-bottom: none;
                border-right: 1px solid #333;
            }
        }
        .epoha {
            text-align: center;
            text-shadow: -2px 2px 0 #A5A5A5;
            font-family: 'Rubik Mono One', monospace;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .name_epoha {
            text-align: center;
            text-shadow: 2px 2px 0 #FF0000;
            font-family: 'Rubik Mono One', monospace;
            margin-bottom: 20px;
        }
        .glava-container {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 102, 0, 0.1);
            border-left: 4px solid #ff6600;
            border-radius: 8px;
        }
        .glava-title {
            font-family: 'Rubik Mono One', monospace;
            font-size: 1.5rem;
            color: #ff6600;
            margin-bottom: 15px;
        }
        .glava-text {
            font-family: 'Rubik Mono One', monospace;
            line-height: 1.6;
            font-size: 1rem;
            color: #ddd;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #ff6600;
        }
        .error {
            text-align: center;
            padding: 50px;
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-btn">Главная</a>
            <a href="online.html" class="nav-btn">Онлайн</a>
            <a href="gallery.html" class="nav-btn">Фотогаллерея</a>
            <a href="history.html" class="nav-btn active">История</a>
        </div>
    </div>
    <h1 style="text-align:center; font-family: 'Rubik Mono One', monospace; margin-top: 10px; margin-bottom: 5px">Повесть временных <span style="color:#FF2400; font-family: 'Rubik Mono One', monospace;">безумий</span></h1>  
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="loading" style="padding: 20px; font-size: 14px;">Загрузка...</div>
        </div>
        <div class="content" id="content">
            <div class="loading">Загрузка истории...</div>
        </div>
    </div>
    <p style="text-align: right; font-family: 'Rubik Mono One', monospace; color: grey">by kiman</p>

    <script>
        let historyData = [];

        async function loadHistory() {
            try {
                const response = await fetch('history.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                historyData = await response.json();
                if (!Array.isArray(historyData)) throw new Error('Данные не являются массивом');
                
                const epohas = [...new Set(historyData.map(item => item.epoha))];
                epohas.sort((a, b) => parseInt(a) - parseInt(b));
                
                renderSidebar(epohas);
                renderContent(epohas);
                
                if (epohas.length > 0) {
                    switchTab(epohas[0]);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('sidebar').innerHTML = '<div class="error">Ошибка загрузки history.json</div>';
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <h3>❌ Не удалось загрузить history.json</h3>
                        <p>Убедитесь, что файл находится в той же папке и имеет правильный формат.</p>
                        <p>Детали: ${error.message}</p>
                    </div>
                `;
            }
        }

        function renderSidebar(epohas) {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '';
            
            epohas.forEach(epoha => {
                const button = document.createElement('button');
                button.className = 'tab-button';
                button.setAttribute('data-tab', epoha);
                
                let displayNumber = epoha;
                if (epoha === '0') displayNumber = '0';
                button.textContent = displayNumber;
                
                button.addEventListener('click', function() {
                    switchTab(epoha);
                });
                
                sidebar.appendChild(button);
            });
        }

        function renderContent(epohas) {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '';
            
            epohas.forEach(epoha => {
                const tabDiv = document.createElement('div');
                tabDiv.className = 'tab-content';
                tabDiv.id = epoha;
                
                const glavyForEpoha = historyData.filter(item => item.epoha === epoha);
                glavyForEpoha.sort((a, b) => parseInt(a.glava) - parseInt(b.glava));
                
                let epohaTitle = '';
                let epohaSubtitle = '';
                
                switch(epoha) {
                    case '0':
                        epohaTitle = 'Эпоха нулевая';
                        epohaSubtitle = '"До нашей эры"';
                        break;
                    case '1':
                        epohaTitle = 'Эпоха первая';
                        epohaSubtitle = '"Зарождение"';
                        break;
                    case '2':
                        epohaTitle = 'Эпоха вторая';
                        epohaSubtitle = '"Расцвет"';
                        break;
                    case '3':
                        epohaTitle = 'Эпоха третья';
                        epohaSubtitle = '"Испытания"';
                        break;
                    case '4':
                        epohaTitle = 'Эпоха четвертая';
                        epohaSubtitle = '"Перемены"';
                        break;
                    case '5':
                        epohaTitle = 'Эпоха пятая';
                        epohaSubtitle = '"Восстание"';
                        break;
                    case '6':
                        epohaTitle = 'Эпоха шестая';
                        epohaSubtitle = '"Возрождение"';
                        break;
                    case '7':
                        epohaTitle = 'Эпоха седьмая';
                        epohaSubtitle = '"Единство"';
                        break;
                    case '8':
                        epohaTitle = 'Эпоха восьмая';
                        epohaSubtitle = '"Новый путь"';
                        break;
                    case '9':
                        epohaTitle = 'Эпоха девятая';
                        epohaSubtitle = '"Финал"';
                        break;
                    default:
                        epohaTitle = `Эпоха ${epoha}`;
                        epohaSubtitle = 'Исторический период';
                }
                
                const titleHTML = `
                    <h2 class="epoha">${epohaTitle}</h2>
                    <h3 class="name_epoha">"${epohaSubtitle}"</h3>
                `;
                tabDiv.innerHTML = titleHTML;
                
                glavyForEpoha.forEach(glavaItem => {
                    const glavaDiv = document.createElement('div');
                    glavaDiv.className = 'glava-container';
                    glavaDiv.innerHTML = `
                        <div class="glava-title">Глава ${glavaItem.glava}</div>
                        <div class="glava-text">${glavaItem.text}</div>
                    `;
                    tabDiv.appendChild(glavaDiv);
                });
                
                contentDiv.appendChild(tabDiv);
            });
        }

        function switchTab(tabId) {
            const buttons = document.querySelectorAll('.tab-button');
            const contents = document.querySelectorAll('.tab-content');
            
            contents.forEach(content => content.classList.remove('active'));
            buttons.forEach(button => button.classList.remove('active'));
            
            const activeContent = document.getElementById(tabId);
            if (activeContent) activeContent.classList.add('active');
            
            const activeButton = document.querySelector(`.tab-button[data-tab="${tabId}"]`);
            if (activeButton) activeButton.classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
